  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#F2F2F7; --surface:#FFFFFF; --border:#E2E2EA;
      --text:#0F1115; --muted:#6B6B80; --faint:#C4C4D4;
      --purple:#6B5CFF; --purple-dark:#3F4499; --purple-light:#C9C3FF;
      --blue:#4F6EDC;
      --card-radius:14px;
    }
    [data-theme="dark"] {
      --bg:#0F1115; --surface:#1E2027; --border:#2E3039;
      --text:#FFFFFF; --muted:#9999B0; --faint:#444460;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

    /* HEADER */
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .logo-area{display:flex;align-items:center;gap:14px;}
    .logo-img{height:26px;width:auto;}
    .logo-divider{width:1px;height:26px;background:var(--border);}
    .logo-sub{font-size:13px;color:var(--muted);}
    .nav-pills{display:flex;gap:6px;}
    .nav-pill{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:6px 16px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;text-decoration:none;transition:all .15s;}
    .nav-pill:hover,.nav-pill.active{background:var(--purple);color:#fff;border-color:var(--purple);}
    .header-right{display:flex;align-items:center;gap:10px;}
    #theme-btn{background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;}

    /* FILTERS BAR */
    .filters-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 2rem;display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;}
    .filter-group{display:flex;flex-direction:column;gap:5px;}
    .filter-group label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
    .filter-group input,.filter-group select{
      font-family:'Inter',sans-serif;font-size:13px;
      padding:7px 12px;border:1px solid var(--border);border-radius:8px;
      background:var(--bg);color:var(--text);outline:none;
      transition:border-color .15s;min-width:160px;
    }
    .filter-group input:focus,.filter-group select:focus{border-color:var(--purple);}
    #apply-btn{
      font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
      padding:8px 22px;background:var(--purple);color:#fff;
      border:none;border-radius:8px;cursor:pointer;
      transition:opacity .15s;align-self:flex-end;
    }
    #apply-btn:hover{opacity:.88;}
    #apply-btn:disabled{opacity:.5;cursor:not-allowed;}

    /* MAIN */
    main{padding:2rem;}

    /* KPI CARDS */
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:2rem;}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:18px 20px;}
    .kpi-num{font-family:'Poppins',sans-serif;font-size:28px;font-weight:700;color:var(--purple);line-height:1;margin-bottom:4px;}
    .kpi-label{font-size:12px;color:var(--muted);font-weight:500;}

    /* CHARTS ROW */
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:2rem;}
    @media(max-width:900px){.charts-row{grid-template-columns:1fr;}}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:20px;}
    .chart-title{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;color:var(--purple-dark);margin-bottom:16px;}
    [data-theme="dark"] .chart-title{color:var(--purple-light);}
    .chart-wrap{position:relative;height:280px;}

    /* RANKING */
    .ranking-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:20px;margin-bottom:2rem;}
    .ranking-title{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;color:var(--purple-dark);margin-bottom:16px;}
    [data-theme="dark"] .ranking-title{color:var(--purple-light);}
    .ranking-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
    .ranking-row:last-child{border-bottom:none;}
    .rank-num{font-family:'Poppins',sans-serif;font-size:16px;font-weight:700;color:var(--faint);width:28px;flex-shrink:0;text-align:center;}
    .rank-num.gold{color:#F59E0B;}
    .rank-num.silver{color:#9CA3AF;}
    .rank-num.bronze{color:#CD7C54;}
    .rank-name{flex:1;font-size:13px;font-weight:500;}
    .rank-bar-wrap{width:200px;height:8px;background:var(--bg);border-radius:999px;overflow:hidden;flex-shrink:0;}
    .rank-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--blue));}
    .rank-hours{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--purple);width:70px;text-align:right;flex-shrink:0;}

    /* TABLE */
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:20px;}
    .table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
    .table-title{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;color:var(--purple-dark);}
    [data-theme="dark"] .table-title{color:var(--purple-light);}
    .table-search{font-family:'Inter',sans-serif;font-size:13px;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;width:200px;}
    .table-search:focus{border-color:var(--purple);}
    .data-table{width:100%;border-collapse:collapse;font-size:13px;}
    .data-table th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
    .data-table th:hover{color:var(--purple);}
    .data-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
    .data-table tr:last-child td{border-bottom:none;}
    .data-table tr:hover td{background:var(--bg);}
    .collab-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;background:var(--doing-bg,#EDEAFF);color:var(--purple);}
    .client-tag{font-size:11px;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:999px;border:1px solid var(--border);}
    .sort-icon{font-size:10px;margin-left:3px;}

    /* EMPTY / LOADING */
    #loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;}
    .spinner-ring{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-text{font-size:14px;color:var(--muted);font-weight:500;}
    .empty-state{text-align:center;padding:48px;color:var(--faint);font-size:14px;}
    #inline-spinner{display:none;text-align:center;padding:32px;}

    @media(max-width:600px){
      header{padding:0 1rem;} .filters-bar{padding:12px 1rem;} main{padding:1rem;}
      .nav-pills{display:none;}
    }
  </style>
</head>
<body>
<div id="loading-overlay">
  <div class="spinner-ring"></div>
  <div class="loading-text">Carregando volumetria…</div>
</div>

<div class="filters-bar">
  <div class="filter-group">
    <label>Data início</label>
    <input type="date" id="f-start"/>
  </div>
  <div class="filter-group">
    <label>Data fim</label>
    <input type="date" id="f-end"/>
  </div>
  <div class="filter-group">
    <label>Cliente</label>
    <select id="f-client">
      <option value="">Todos os clientes</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Colaborador</label>
    <select id="f-collab">
      <option value="">Todos</option>
    </select>
  </div>

</div>

<main>
  <div id="inline-spinner"><div class="spinner-ring" style="margin:auto;"></div></div>
  <div id="content" style="display:none;">
    <!-- KPIs -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">⏱ Horas por Colaborador</div>
        <div class="chart-wrap"><canvas id="chart-collab"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">🥧 Distribuição por Cliente</div>
        <div class="chart-wrap"><canvas id="chart-client"></canvas></div>
      </div>
    </div>

    <!-- Ranking -->
    <div class="ranking-card">
      <div class="ranking-title">🏆 Ranking de Colaboradores</div>
      <div id="ranking-list"></div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">📋 Detalhamento de Tasks</div>
        <input type="text" class="table-search" id="table-search" placeholder="Buscar task ou colaborador…" oninput="filterTable()"/>
      </div>
      <div style="overflow-x:auto;">
        <table class="data-table" id="data-table">
          <thead>
            <tr>
              <th onclick="sortTable('user_name')">Colaborador <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('client_name')">Cliente <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('task_title')">Task <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('created_at')">Data <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('hours')" style="text-align:right;">Horas <span class="sort-icon">↕</span></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div id="table-empty" class="empty-state" style="display:none;">Nenhum registro encontrado.</div>
    </div>
  </div>
</main>

<script>
let allEntries = [];
let filteredEntries = [];
let chartCollab = null;
let chartClient = null;
let sortKey = 'created_at';
let sortAsc = false;
let isDark = false;

const PURPLE_PALETTE = ['#6B5CFF','#4F6EDC','#3F4499','#C9C3FF','#8B5CF6','#7C3AED','#A78BFA','#6D28D9','#DDD6FE','#4338CA'];

// ── INIT ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
  document.getElementById('f-start').value = fmt(firstDay);
  document.getElementById('f-end').value   = fmt(today);
  loadData();
});

function fmt(d) {
  return d.toISOString().split('T')[0];
}

function secToHours(s) {
  return s ? +(s / 3600).toFixed(2) : 0;
}

function fmtH(h) {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return hh + 'h' + (mm > 0 ? mm + 'm' : '');
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit'});
}

// ── LOAD ──────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('loading-overlay').style.display = 'flex';
  try {
    const start = document.getElementById('f-start').value;
    const end   = document.getElementById('f-end').value;
    let url = '/api/timesheet?';
    if (start) url += 'start_date=' + start + '&';
    if (end)   url += 'end_date='   + end;

    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    allEntries = Array.isArray(data) ? data : [];
    populateFilters();
    applyFilters();
  } catch(e) {
    alert('Erro ao carregar dados: ' + e.message);
  } finally {
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

function populateFilters() {
  const clients = [...new Set(allEntries.map(e => e.client_name).filter(Boolean))].sort();
  const collabs = [...new Set(allEntries.map(e => e.user_name).filter(Boolean))].sort();

  const fc = document.getElementById('f-client');
  const fco = document.getElementById('f-collab');
  fc.innerHTML  = '<option value="">Todos os clientes</option>' + clients.map(c => `<option value="${c}">${c}</option>`).join('');
  fco.innerHTML = '<option value="">Todos</option>' + collabs.map(c => `<option value="${c}">${c}</option>`).join('');
}

// ── APPLY FILTERS ─────────────────────────────────────────────────────
async function applyFilters() {
  const btn = document.getElementById('apply-btn');
  btn.disabled = true;
  document.getElementById('inline-spinner').style.display = 'block';
  document.getElementById('content').style.display = 'none';

  const start  = document.getElementById('f-start').value;
  const end    = document.getElementById('f-end').value;
  const client = document.getElementById('f-client').value;
  const collab = document.getElementById('f-collab').value;

  try {
    let url = '/api/timesheet?';
    if (start) url += 'start_date=' + start + '&';
    if (end)   url += 'end_date='   + end   + '&';
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    allEntries = Array.isArray(data) ? data : [];
    populateFilters();

    filteredEntries = allEntries.filter(e => {
      if (client && e.client_name !== client) return false;
      if (collab && e.user_name  !== collab)  return false;
      return true;
    });

    renderAll();
    document.getElementById('content').style.display = 'block';
  } catch(e) {
    alert('Erro: ' + e.message);
  } finally {
    btn.disabled = false;
    document.getElementById('inline-spinner').style.display = 'none';
  }
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderAll() {
  renderKPIs();
  renderCharts();
  renderRanking();
  renderTable();
}

function renderKPIs() {
  const totalH = filteredEntries.reduce((s,e) => s + secToHours(e.amount || e.seconds || e.time_worked || 0), 0);
  const collabs = new Set(filteredEntries.map(e => e.user_name).filter(Boolean)).size;
  const clients = new Set(filteredEntries.map(e => e.client_name).filter(Boolean)).size;
  const tasks   = new Set(filteredEntries.map(e => e.task_id).filter(Boolean)).size;

  document.getElementById('kpi-row').innerHTML = [
    {n: fmtH(totalH), l: 'Total de Horas'},
    {n: filteredEntries.length, l: 'Apontamentos'},
    {n: tasks,   l: 'Tasks únicas'},
    {n: collabs, l: 'Colaboradores'},
    {n: clients, l: 'Clientes'},
  ].map(k => `<div class="kpi-card"><div class="kpi-num">${k.n}</div><div class="kpi-label">${k.l}</div></div>`).join('');
}

function groupBy(arr, key, valFn) {
  const map = {};
  arr.forEach(e => {
    const k = e[key] || 'Desconhecido';
    map[k] = (map[k] || 0) + valFn(e);
  });
  return map;
}

function renderCharts() {
  const byCollab = groupBy(filteredEntries, 'user_name', e => secToHours(e.amount || e.seconds || e.time_worked || 0));
  const byClient = groupBy(filteredEntries, 'client_name', e => secToHours(e.amount || e.seconds || e.time_worked || 0));

  const collabLabels = Object.keys(byCollab).sort((a,b) => byCollab[b] - byCollab[a]);
  const collabData   = collabLabels.map(k => +byCollab[k].toFixed(2));

  const clientLabels = Object.keys(byClient).sort((a,b) => byClient[b] - byClient[a]).slice(0,10);
  const clientData   = clientLabels.map(k => +byClient[k].toFixed(2));

  const gridColor  = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const labelColor = isDark ? '#9999B0' : '#6B6B80';
  const textColor  = isDark ? '#FFFFFF' : '#0F1115';

  if (chartCollab) chartCollab.destroy();
  chartCollab = new Chart(document.getElementById('chart-collab'), {
    type: 'bar',
    data: {
      labels: collabLabels,
      datasets: [{ label: 'Horas', data: collabData,
        backgroundColor: collabLabels.map((_,i) => PURPLE_PALETTE[i % PURPLE_PALETTE.length]),
        borderRadius: 6, borderSkipped: false }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + fmtH(ctx.raw) } } },
      scales: {
        x: { ticks: { color: labelColor, font: {size:11} }, grid: { color: gridColor } },
        y: { ticks: { color: labelColor, font: {size:11}, callback: v => fmtH(v) }, grid: { color: gridColor } }
      }
    }
  });

  if (chartClient) chartClient.destroy();
  chartClient = new Chart(document.getElementById('chart-client'), {
    type: 'doughnut',
    data: {
      labels: clientLabels,
      datasets: [{ data: clientData,
        backgroundColor: clientLabels.map((_,i) => PURPLE_PALETTE[i % PURPLE_PALETTE.length]),
        borderWidth: 2, borderColor: isDark ? '#1E2027' : '#FFFFFF' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { position: 'right', labels: { color: textColor, font: {size:11}, boxWidth:12, padding:10 } },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.label + ': ' + fmtH(ctx.raw) } }
      }
    }
  });
}

function renderRanking() {
  const byCollab = groupBy(filteredEntries, 'user_name', e => secToHours(e.amount || e.seconds || e.time_worked || 0));
  const sorted = Object.entries(byCollab).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;

  const medals = ['gold','silver','bronze'];
  document.getElementById('ranking-list').innerHTML = sorted.map(([name, hours], i) => `
    <div class="ranking-row">
      <div class="rank-num ${medals[i]||''}">${i+1}</div>
      <div class="rank-name">${name}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(hours/max*100).toFixed(1)}%"></div></div>
      <div class="rank-hours">${fmtH(hours)}</div>
    </div>`).join('') || '<div class="empty-state">Sem dados.</div>';
}

let tableData = [];
function renderTable() {
  tableData = filteredEntries.map(e => ({
    user_name:   e.user_name   || '—',
    client_name: e.client_name || '—',
    task_title:  e.task_title  || e.task_name || '—',
    created_at:  e.created_at  || e.date || '',
    hours:       secToHours(e.amount || e.seconds || e.time_worked || 0),
  }));
  sortTableData();
}

function sortTable(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  sortTableData();
}

function sortTableData() {
  tableData.sort((a,b) => {
    const av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'number') return sortAsc ? av-bv : bv-av;
    return sortAsc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });
  renderTableRows(tableData);
}

function filterTable() {
  const q = document.getElementById('table-search').value.toLowerCase();
  const filtered = q ? tableData.filter(r =>
    r.user_name.toLowerCase().includes(q) ||
    r.task_title.toLowerCase().includes(q) ||
    r.client_name.toLowerCase().includes(q)
  ) : tableData;
  renderTableRows(filtered);
}

function renderTableRows(rows) {
  const body = document.getElementById('table-body');
  const empty = document.getElementById('table-empty');
  if (!rows.length) { body.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  body.innerHTML = rows.map(r => `
    <tr>
      <td><span class="collab-badge">${r.user_name}</span></td>
      <td><span class="client-tag">${r.client_name}</span></td>
      <td style="max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.task_title}</td>
      <td style="color:var(--muted);">${fmtDate(r.created_at)}</td>
      <td style="text-align:right;font-weight:600;color:var(--purple);">${fmtH(r.hours)}</td>
    </tr>`).join('');
}

// ── THEME ─────────────────────────────────────────────────────────────
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : '');
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('logo-img').style.filter = isDark ? 'brightness(0) invert(1)' : '';
  if (filteredEntries.length) renderCharts();
}
</script>
